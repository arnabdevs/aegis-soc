services:
  - type: web
    name: aegis-soc-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
      - key: HIBP_API_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
